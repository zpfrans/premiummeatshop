databases:
  - name: farmerpremium-postgres
    databaseName: farmerpremiummeatshop
    user: farmerpremium

services:
  - type: web
    name: farmerpremium-backend
    env: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm run migrate:up && npm run seed && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: farmerpremium-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: FRONTEND_ORIGINS
        sync: false
      - key: MAX_UPLOAD_SIZE_MB
        value: 5
      - key: UPLOAD_DIR
        value: uploads
      - key: TRUST_PROXY
        value: 1
      - key: ADMIN_SEED_USERNAME
        value: admin
      - key: ADMIN_SEED_PASSWORD
        sync: false

  - type: web
    name: farmerpremium-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
